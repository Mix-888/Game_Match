<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเกมจับคู่อิเล็กทรอนิกส์ (อัปเดตแก้บัคเส้นโยง)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap');

        body {
            font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; color: #333;
            margin: 0; padding: 20px; text-align: center;
        }

        h1, h2 { color: #2c3e50; }
        
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        button {
            padding: 10px 20px; font-size: 1em; border: none; border-radius: 5px; cursor: pointer;
            background-color: #007bff; color: white; font-weight: bold; transition: 0.3s;
        }
        button:hover { filter: brightness(0.9); }
        .btn-green { background-color: #28a745; }
        .btn-red { background-color: #dc3545; }
        .btn-teal { background-color: #17a2b8; }
        .btn-orange { background-color: #fd7e14; }
        .btn-gray { background-color: #6c757d; }
        .btn-gold { background-color: #ffc107; color: #333; }

        #menu-section, #builder-section, #game-section { display: none; }
        
        /* สไตล์ Builder */
        .input-group, .save-load-group {
            display: flex; gap: 10px; justify-content: center; align-items: center; 
            background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .save-load-group { background: #fff3cd; border: 1px dashed #ffc107; }
        input[type="text"] { padding: 10px; font-size: 1em; border: 1px solid #ccc; border-radius: 5px; width: 250px; }
        input[type="file"] { padding: 10px; font-size: 0.9em; }
        
        .item-list { text-align: left; margin-top: 20px; }
        .item-row { display: flex; align-items: center; gap: 15px; padding: 10px; border-bottom: 1px solid #ddd; }
        .item-row img { max-width: 60px; max-height: 60px; border-radius: 5px; border: 1px solid #ccc; object-fit: contain; }

        /* สไตล์ Game */
        #game-board { display: flex; justify-content: space-between; position: relative; margin-top: 30px; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
        .column { display: flex; flex-direction: column; gap: 30px; width: 40%; z-index: 2; }
        
        .card {
            background: #fff; border: 2px solid #ccc; border-radius: 10px; padding: 15px;
            cursor: pointer; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            position: relative; display: flex; align-items: center; justify-content: center;
            min-height: 80px; font-size: 1.2em; font-weight: 600; transition: 0.2s;
        }
        .card img { max-width: 100%; max-height: 120px; object-fit: contain; }
        .card:hover { transform: scale(1.02); border-color: #888; }
        .card.selected { border-color: #2196F3; background: #e3f2fd; }
        .card.matched { border-color: #4CAF50; background: #e8f5e9; pointer-events: none; }
        .card.error { border-color: #f44336; background: #ffebee; }

        .node {
            width: 16px; height: 16px; background-color: #ccc; border-radius: 50%;
            position: absolute; top: 50%; transform: translateY(-50%); border: 2px solid white; box-shadow: 0 0 3px rgba(0,0,0,0.3);
            z-index: 5;
        }
        .left-col .node { right: -10px; }
        .right-col .node { left: -10px; }
        .card.selected .node { background-color: #2196F3; }

        #score-board { font-size: 1.5em; font-weight: bold; color: #d32f2f; margin-bottom: 20px; display: flex; justify-content: space-between; padding: 0 20px; }

        /* Modals */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 10px; text-align: center; width: 350px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .modal-content input {
            width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 1em;
        }
        .modal-btn-group { display: flex; justify-content: space-between; margin-top: 15px; gap: 10px; }
        .modal-btn-group button { flex: 1; }

        /* ตารางคะแนน */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
        th { background-color: #f8f9fa; }
        .leaderboard-modal { width: 500px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="modal-overlay" id="login-modal">
        <div class="modal-content">
            <h2>🔒 ยืนยันตัวตน (Admin)</h2>
            <input type="text" id="login-id" placeholder="ID">
            <input type="password" id="login-pass" placeholder="Password">
            <div class="modal-btn-group">
                <button class="btn-gray" onclick="closeModal('login-modal')">ยกเลิก</button>
                <button class="btn-green" onclick="checkLogin()">เข้าสู่ระบบ</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="name-modal">
        <div class="modal-content">
            <h2>📝 กรอกชื่อผู้เล่น</h2>
            <input type="text" id="player-name" placeholder="ระบุชื่อของคุณ...">
            <div class="modal-btn-group">
                <button class="btn-gray" onclick="closeModal('name-modal')">ยกเลิก</button>
                <button class="btn-green" onclick="confirmName()">เริ่มเล่นเกม</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="leaderboard-modal">
        <div class="modal-content leaderboard-modal">
            <h2>🏆 ตารางคะแนนผู้เล่น</h2>
            <table>
                <thead>
                    <tr><th>อันดับ</th><th>ชื่อผู้เล่น</th><th>คะแนน</th><th>วันที่</th></tr>
                </thead>
                <tbody id="leaderboard-tbody">
                    </tbody>
            </table>
            <div class="modal-btn-group" style="margin-top: 20px;">
                <button class="btn-gray" onclick="closeModal('leaderboard-modal')">ปิด</button>
                <button class="btn-red" onclick="requireLogin(clearLeaderboard)">🗑️ ล้างข้อมูล (Admin)</button>
            </div>
        </div>
    </div>

    <div class="container">
        
        <div id="menu-section" style="display: block;">
            <h1>⚡ ระบบเกมจับคู่อุปกรณ์อิเล็กทรอนิกส์</h1>
            <p style="font-size: 1.2em; margin-bottom: 40px;">กรุณาเลือกระบบที่ต้องการใช้งาน</p>
            
            <button class="btn-green" style="font-size: 1.2em; padding: 15px 30px; margin: 10px; width: 80%; max-width: 400px;" onclick="document.getElementById('import-play-file').click()">
                🎮 นักเรียน: โหลดไฟล์และเล่นเกม
            </button>
            <input type="file" id="import-play-file" accept=".json" style="display:none;" onchange="importAndPlay(event)">
            
            <br>
            
            <button class="btn-gold" style="font-size: 1.2em; padding: 15px 30px; margin: 10px; width: 80%; max-width: 400px;" onclick="showLeaderboard()">
                🏆 ดูตารางคะแนน (Leaderboard)
            </button>
            
            <br>

            <button class="btn-red" style="font-size: 1.2em; padding: 15px 30px; margin: 10px; width: 80%; max-width: 400px;" onclick="requireLogin(showBuilder)">
                🛠️ อาจารย์: สร้าง/แก้ไขข้อสอบ
            </button>
        </div>

        <div id="builder-section">
            <h1>🛠️ สร้างเกมจับคู่ (โหมดอาจารย์)</h1>
            
            <div class="save-load-group">
                <button class="btn-teal" onclick="exportGame()">💾 บันทึกเกมเป็นไฟล์ (Save)</button>
                <button class="btn-orange" onclick="document.getElementById('import-build-file').click()">📂 โหลดไฟล์มาแก้ไข (Load)</button>
                <input type="file" id="import-build-file" accept=".json" style="display:none;" onchange="importGame(event)">
            </div>

            <div class="input-group">
                <input type="text" id="text-input" placeholder="พิมพ์ข้อความ (ฝั่งซ้าย)...">
                <input type="file" id="image-input" accept="image/*">
                <button onclick="addItem()">+ เพิ่มข้อนี้</button>
            </div>

            <div class="item-list" id="item-list">
                <h3>รายการที่เพิ่มแล้ว: (0 ข้อ)</h3>
            </div>

            <button class="btn-green" style="font-size: 1.2em; padding: 15px 30px; margin-top: 20px; width: 100%;" onclick="askPlayerName()">▶️ ทดลองเล่นเกม</button>
            <button class="btn-gray" style="margin-top: 10px; width: 100%;" onclick="showMenu()">🏠 กลับเมนูหลัก</button>
        </div>

        <div id="game-section">
            <h1>🎮 เล่นเกมจับคู่</h1>
            <button class="btn-red" style="margin-bottom: 20px;" onclick="requireLogin(showBuilder)">⬅️ กลับไปแก้ไข/เพิ่มข้อ (Admin)</button>
            <button class="btn-gray" style="margin-bottom: 20px;" onclick="showMenu()">🏠 ออกไปหน้าเมนูหลัก</button>
            
            <div id="score-board">
                <span id="display-matches">จับคู่สำเร็จ: 0 / 0</span>
                <span id="display-points">คะแนนรวม: 0</span>
            </div>

            <div id="game-board">
                <canvas id="canvas"></canvas>
                <div class="column left-col" id="left-col"></div>
                <div class="column right-col" id="right-col"></div>
            </div>
        </div>

    </div>

    <script>
        let gameData = [];
        let itemIdCounter = 1;

        let currentPlayerName = "ผู้เล่นทั่วไป";
        let selectedLeft = null;
        let selectedRight = null;
        let connections = [];
        let matchCount = 0;
        let totalPoints = 0;
        const POINTS_CORRECT = 10;
        const POINTS_WRONG = 3; 
        const lineColors = ['#e91e63', '#9c27b0', '#3f51b5', '#00bcd4', '#4caf50', '#ff9800', '#795548', '#607d8b'];

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const gameBoard = document.getElementById('game-board');

        // ==== ใหม่: ระบบตรวจจับการเปลี่ยนขนาด Layout (ป้องกันเส้นเบี้ยว/หาย) ====
        const resizeObserver = new ResizeObserver(() => {
            if(gameBoard.offsetWidth > 0) { 
                canvas.width = gameBoard.offsetWidth; 
                canvas.height = gameBoard.offsetHeight; 
                drawLines(); 
            }
        });
        resizeObserver.observe(gameBoard);

        // ==== การจัดการ Modals ====
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // ==== ระบบ Login ====
        let loginSuccessCallback = null;
        function requireLogin(callback) {
            loginSuccessCallback = callback;
            document.getElementById('login-modal').style.display = 'flex';
        }
        function checkLogin() {
            const id = document.getElementById('login-id').value;
            const pass = document.getElementById('login-pass').value;
            if (id === 'Admin' && pass === 'Kaset') {
                closeModal('login-modal');
                document.getElementById('login-id').value = '';
                document.getElementById('login-pass').value = '';
                if (loginSuccessCallback) loginSuccessCallback();
            } else { alert('❌ ID หรือ Password ไม่ถูกต้อง!'); }
        }

        // ==== ระบบชื่อผู้เล่น ====
        function askPlayerName() {
            if (gameData.length < 2) { alert('ต้องมีข้อมูลอย่างน้อย 2 ข้อจึงจะเล่นได้ครับ!'); return; }
            document.getElementById('player-name').value = '';
            document.getElementById('name-modal').style.display = 'flex';
        }
        function confirmName() {
            let nameInput = document.getElementById('player-name').value.trim();
            if (nameInput === "") { alert("กรุณาใส่ชื่อของคุณด้วยครับ!"); return; }
            currentPlayerName = nameInput;
            closeModal('name-modal');
            startGame();
        }

        // ==== ระบบ Leaderboard ====
        function saveScore() {
            let board = JSON.parse(localStorage.getItem('matchingGameScores')) || [];
            let today = new Date().toLocaleDateString('th-TH');
            board.push({ name: currentPlayerName, score: totalPoints, date: today });
            board.sort((a, b) => b.score - a.score);
            localStorage.setItem('matchingGameScores', JSON.stringify(board));
        }

        function showLeaderboard() {
            let board = JSON.parse(localStorage.getItem('matchingGameScores')) || [];
            let tbody = document.getElementById('leaderboard-tbody');
            tbody.innerHTML = '';
            
            if(board.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">ยังไม่มีสถิติผู้เล่นครับ</td></tr>';
            } else {
                board.forEach((entry, index) => {
                    if(index < 10) {
                        tbody.innerHTML += `<tr><td>${index+1}</td><td>${entry.name}</td><td><strong>${entry.score}</strong></td><td>${entry.date}</td></tr>`;
                    }
                });
            }
            document.getElementById('leaderboard-modal').style.display = 'flex';
        }

        function clearLeaderboard() {
            if (confirm("⚠️ ยืนยันการล้างข้อมูลตารางคะแนนทั้งหมด?\n(ข้อมูลจะไม่สามารถกู้คืนได้)")) {
                localStorage.removeItem('matchingGameScores');
                showLeaderboard(); 
                alert("✅ ล้างข้อมูลตารางคะแนนเรียบร้อยแล้ว");
            }
        }

        // ==== ระบบการนำทาง ====
        function showMenu() {
            document.getElementById('menu-section').style.display = 'block';
            document.getElementById('builder-section').style.display = 'none';
            document.getElementById('game-section').style.display = 'none';
        }
        function showBuilder() {
            document.getElementById('menu-section').style.display = 'none';
            document.getElementById('game-section').style.display = 'none';
            document.getElementById('builder-section').style.display = 'block';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // ==== ระบบ Save / Load ====
        function exportGame() {
            if (gameData.length === 0) { alert('ยังไม่มีข้อมูลข้อสอบให้บันทึกครับ'); return; }
            const dataStr = JSON.stringify(gameData);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'matching_game.json'; a.click();
            URL.revokeObjectURL(url);
        }
        function importGame(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    gameData = JSON.parse(e.target.result);
                    let maxId = 0; gameData.forEach(item => { if (item.id > maxId) maxId = item.id; });
                    itemIdCounter = maxId + 1; renderItemList(); alert('✅ โหลดข้อมูลสำเร็จแล้ว!');
                } catch (error) { alert('❌ ไฟล์ไม่ถูกต้องครับ'); }
            }; reader.readAsText(file); event.target.value = '';
        }
        function importAndPlay(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    gameData = JSON.parse(e.target.result);
                    askPlayerName(); 
                } catch (error) { alert('❌ ไฟล์ไม่ถูกต้องครับ'); }
            }; reader.readAsText(file); event.target.value = '';
        }

        // ==== ระบบ Builder ====
        function addItem() {
            const textInput = document.getElementById('text-input').value;
            const fileInput = document.getElementById('image-input').files[0];
            if (!textInput || !fileInput) { alert('กรุณาพิมพ์ข้อความและเลือกรูปภาพให้ครบก่อนกดเพิ่มครับ!'); return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                gameData.push({ id: itemIdCounter++, text: textInput, image: e.target.result });
                renderItemList(); document.getElementById('text-input').value = ''; document.getElementById('image-input').value = '';
            }; reader.readAsDataURL(fileInput);
        }
        function removeItem(id) { gameData = gameData.filter(item => item.id !== id); renderItemList(); }
        function renderItemList() {
            const listContainer = document.getElementById('item-list');
            listContainer.innerHTML = `<h3>รายการที่เพิ่มแล้ว: (${gameData.length} ข้อ)</h3>`;
            gameData.forEach(item => {
                const row = document.createElement('div'); row.className = 'item-row';
                row.innerHTML = `<button class="btn-red" style="padding: 5px 10px; font-size: 0.9em;" onclick="removeItem(${item.id})">ลบ</button>
                    <strong>${item.text}</strong> <span>คู่กับ</span> <img src="${item.image}">`;
                listContainer.appendChild(row);
            });
        }

        // ==== ระบบการเล่นเกม ====
        function startGame() {
            document.getElementById('menu-section').style.display = 'none';
            document.getElementById('builder-section').style.display = 'none';
            document.getElementById('game-section').style.display = 'block';
            
            selectedLeft = null; selectedRight = null; connections = [];
            matchCount = 0; totalPoints = 0;
            updateScoreUI();
            buildGameBoard();
        }

        function updateScoreUI() {
            document.getElementById('display-matches').innerText = `จับคู่สำเร็จ: ${matchCount} / ${gameData.length}`;
            document.getElementById('display-points').innerText = `คะแนนรวม: ${totalPoints}`;
        }

        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

        function buildGameBoard() {
            const leftCol = document.getElementById('left-col'); const rightCol = document.getElementById('right-col');
            leftCol.innerHTML = ''; rightCol.innerHTML = '';
            let leftItems = shuffle([...gameData]); let rightItems = shuffle([...gameData]);

            leftItems.forEach(item => {
                let div = document.createElement('div'); div.className = 'card left-card';
                div.innerHTML = `${item.text} <div class="node"></div>`;
                div.onclick = () => handleSelect(div, item.id, 'left'); leftCol.appendChild(div);
            });
            rightItems.forEach(item => {
                let div = document.createElement('div'); div.className = 'card right-card';
                div.innerHTML = `<div class="node"></div> <img src="${item.image}">`;
                div.onclick = () => handleSelect(div, item.id, 'right'); rightCol.appendChild(div);
            });
        }

        function handleSelect(element, id, side) {
            if (side === 'left') {
                if (selectedLeft) selectedLeft.el.classList.remove('selected');
                selectedLeft = { el: element, id: id };
            } else {
                if (selectedRight) selectedRight.el.classList.remove('selected');
                selectedRight = { el: element, id: id };
            }
            element.classList.add('selected');
            if (selectedLeft && selectedRight) checkMatch();
        }

        function checkMatch() {
            if (selectedLeft.id === selectedRight.id) {
                selectedLeft.el.classList.replace('selected', 'matched');
                selectedRight.el.classList.replace('selected', 'matched');
                
                const color = lineColors[matchCount % lineColors.length];
                
                // แก้ไข: ค้นหาโหนดวงกลมแบบเฉพาะเจาะจงภายในกล่องที่ถูกเลือก (แก้ปัญหา ID ซ้ำกัน)
                const leftNode = selectedLeft.el.querySelector('.node');
                const rightNode = selectedRight.el.querySelector('.node');
                
                leftNode.style.backgroundColor = color;
                rightNode.style.backgroundColor = color;

                connections.push({
                    leftNode: leftNode,
                    rightNode: rightNode, 
                    color: color
                });

                matchCount++;
                totalPoints += POINTS_CORRECT;
                updateScoreUI();
                drawLines();
                
                if(matchCount === gameData.length) {
                    setTimeout(() => {
                        saveScore(); 
                        alert(`🎉 ยอดเยี่ยมมาก ${currentPlayerName}! คุณจับคู่ครบทั้งหมดแล้ว\n⭐ คะแนนรวมของคุณคือ: ${totalPoints} คะแนน`);
                        showLeaderboard();
                    }, 500);
                }

            } else {
                let l = selectedLeft.el; let r = selectedRight.el;
                l.classList.add('error'); r.classList.add('error');
                
                totalPoints -= POINTS_WRONG;
                if(totalPoints < 0) totalPoints = 0; 
                updateScoreUI();

                setTimeout(() => { l.classList.remove('selected', 'error'); r.classList.remove('selected', 'error'); }, 800);
            }
            selectedLeft = null; selectedRight = null;
        }

        function drawLines() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const boardRect = gameBoard.getBoundingClientRect();
            
            connections.forEach(conn => {
                const rect1 = conn.leftNode.getBoundingClientRect(); 
                const rect2 = conn.rightNode.getBoundingClientRect();
                
                // คำนวณพิกัดให้แม่นยำเทียบกับบอร์ด
                const x1 = rect1.left + rect1.width / 2 - boardRect.left; 
                const y1 = rect1.top + rect1.height / 2 - boardRect.top;
                const x2 = rect2.left + rect2.width / 2 - boardRect.left; 
                const y2 = rect2.top + rect2.height / 2 - boardRect.top;
                
                // แก้ไข: สูตรคำนวณเส้นโค้ง (Bezier) แบบแปรผันตามระยะห่างจริง ไม่ตีลังกา
                const offset = Math.max(20, Math.abs(x2 - x1) / 2);
                
                ctx.beginPath(); 
                ctx.moveTo(x1, y1); 
                ctx.bezierCurveTo(x1 + offset, y1, x2 - offset, y2, x2, y2);
                ctx.strokeStyle = conn.color; 
                ctx.lineWidth = 4;
                ctx.stroke();
            });
        }
    </script>
</body>
</html>
